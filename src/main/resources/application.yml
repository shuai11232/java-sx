server:
  port: 8080

spring:
  application:
    name: guanli-system
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tilas?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    username: root
    password: 040909
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sx.guanli.pojo
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT Configuration
jwt:
  secret: your-secret-key-here-must-be-at-least-32-characters
  expiration: 86400000  # 24 hours in milliseconds

# File Upload Configuration
file:
  upload:
    path: upload/
    allowed-types: image/jpeg,image/png,image/gif,application/pdf
    max-size: 10485760  # 10MB in bytes